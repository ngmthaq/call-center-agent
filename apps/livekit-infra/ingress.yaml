# LiveKit Ingress Configuration
# Reference: https://docs.livekit.io/home/self-hosting/ingress/
# All secret values are injected via environment variables — never hardcode credentials here.

redis:
  # Connects to the redis-livekit instance bound to loopback on the host network
  address: 127.0.0.1:6379
  username: ""
  password: ""
  db: 0
  use_tls: false
  sentinel_master_name: ""
  sentinel_username: ""
  sentinel_password: ""
  sentinel_addresses: []
  cluster_addresses: []

# LiveKit server credentials — the livekit/ingress binary reads LIVEKIT_API_KEY and
# LIVEKIT_API_SECRET environment variables directly (set in docker-compose.yml).
# The ${VAR} placeholders here are a documentation aid; the ingress binary resolves
# them via its own env-var expansion, unlike the livekit-server Go YAML parser.
api_key: ${LIVEKIT_API_KEY}
api_secret: ${LIVEKIT_API_SECRET}

# WebSocket URL used by ingress to publish tracks to the LiveKit server
ws_url: wss://livekit.YOURDOMAIN.COM

# RTMP ingest port (used by OBS and other streaming software)
rtmp_port: 1935

# WHIP (WebRTC HTTP Ingest Protocol) port
whip_port: 8080

# Internal HTTP relay port (used for inter-process communication)
http_relay_port: 9090

logging:
  json: false
  level: info

development: false

rtc_config:
  # UDP port for the ingress RTC internal use
  udp_port: 7885
  use_external_ip: false
  enable_loopback_candidate: false

cpu_cost:
  rtmp_cpu_cost: 2.0
  whip_cpu_cost: 2.0
  whip_bypass_transcoding_cpu_cost: 0.1
  url_cpu_cost: 2

# Redis configuration for LiveKit's internal message bus
# This instance runs on the host network and is only reachable from the host itself.
# DO NOT change bind to 0.0.0.0 — this Redis instance should never be publicly accessible.

# Bind exclusively to loopback — not exposed to any external interface
bind 127.0.0.1

# Standard Redis port — used by LiveKit server and Ingress containers (both on host network)
port 6379

# Reject connections from other hosts even if somehow reachable
protected-mode yes

# Keep idle connections alive to detect dead peers
tcp-keepalive 300

# LiveKit Ingress — Development Configuration
# Reference: https://docs.livekit.io/home/self-hosting/ingress/
#
# This file is used for local development. No TLS, no external IP detection.
# Service-to-service communication uses Docker bridge DNS.

redis:
  # Resolved via Docker bridge DNS — dedicated LiveKit Redis
  address: redis-livekit:6379
  username: ""
  password: ""
  db: 0
  use_tls: false
  sentinel_master_name: ""
  sentinel_username: ""
  sentinel_password: ""
  sentinel_addresses: []
  cluster_addresses: []

# Development API credentials — must match livekit.development.yaml keys section
api_key: devkey
api_secret: devsecret

# Plain WebSocket to the livekit container — no TLS in dev mode
ws_url: ws://livekit:7880

# RTMP ingest port (OBS, ffmpeg, etc.)
rtmp_port: 1935

# WHIP (WebRTC HTTP Ingest Protocol) port
whip_port: 8080

# Internal HTTP relay port (inter-process communication)
http_relay_port: 9090

logging:
  json: false
  level: info

development: true

rtc_config:
  # UDP port for the ingress RTC internal use
  udp_port: 7885
  use_external_ip: false
  enable_loopback_candidate: true

cpu_cost:
  rtmp_cpu_cost: 2.0
  whip_cpu_cost: 2.0
  whip_bypass_transcoding_cpu_cost: 0.1
  url_cpu_cost: 2
